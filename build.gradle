buildscript {
    repositories {
        mavenCentral()
        maven {
            url 'https://central.sonatype.com/repository/maven-snapshots/'
        }
    }
    dependencies {
        classpath 'com.pawtograder.info.solidsoft.gradle.pitest:gradle-pitest-plugin:0.1.0'
    }
}

plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    // Fat JAR with all dependencies shaded
    id 'com.github.johnrengelman.shadow' version '8.1.1'
    // Code formatting
    id 'com.diffplug.spotless' version '6.25.0'
    // Code linting
    id 'checkstyle'
    // Error Prone for static analysis
    id 'net.ltgt.errorprone' version '3.1.0'
    // Code coverage
    id 'jacoco'
}

apply plugin: 'com.pawtograder.info.solidsoft.pitest'

repositories {
    mavenCentral()
    mavenLocal()
    maven {
        url 'https://central.sonatype.com/repository/maven-snapshots/'
    }
}

configurations {
    mockitoAgent
    // Exclude Jansi from test runtime to avoid ioctl(TIOCGWINSZ) failures when stdin is piped
    testRuntimeClasspath {
        exclude group: 'org.jline', module: 'jline-terminal-jansi'
    }
}

dependencies {
    // Use JUnit Jupiter (JUnit 5) test framework
    testImplementation libs.junit.jupiter.api
    testRuntimeOnly libs.junit.jupiter.engine
    testImplementation libs.junit.jupiter.params
    testImplementation libs.assertj.core

    // Mockito for mocking in tests
    testImplementation libs.mockito.core
    testImplementation libs.mockito.junit.jupiter
    mockitoAgent libs.byte.buddy.agent

    // JSpecify for nullness annotations
    compileOnly libs.jspecify
    testCompileOnly libs.jspecify

    // Jackson for JSON serialization
    implementation libs.jackson.databind
    implementation libs.jackson.core
    implementation libs.jackson.annotations
    implementation libs.jackson.jdk8      // For Optional support
    implementation libs.jackson.jsr310    // For Java 8 date/time support

    // SLF4J and Logback for logging
    implementation libs.slf4j.api
    implementation libs.logback.classic

    // JLine for CLI interaction
    implementation libs.jline.reader
    implementation libs.jline.terminal
    implementation libs.jline.terminal.jansi

    // Google GenAI for image-to-recipe OCR
    implementation libs.google.genai
}

application {
    mainClass = 'app.cookyourbooks.CookYourBooksApp'
}

// Fat JAR: ./gradlew build (or shadowJar) && java -jar build/libs/cookyourbooks-*-all.jar
shadowJar {
    archiveBaseName = 'cookyourbooks'
    archiveClassifier = 'all'
    mergeServiceFiles()
}

tasks.named('build').configure {
    dependsOn shadowJar
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

testing {
    suites {
        test {
            useJUnitJupiter()
        }
    }
}

test {
    // Don't fail the build if tests fail
    ignoreFailures = true

    testLogging {
        events "failed"
        showStandardStreams = true  // Enable to see debug logs from logback
        exceptionFormat = "full"
        showExceptions = true
        showCauses = true
        showStackTraces = true
    }

    // Show counts of tests passed, failed, and skipped
    afterSuite { desc, result ->
        if (!desc.parent) {
            println "\nTests: ${result.testCount}, Passed: ${result.successfulTestCount}, Failed: ${result.failedTestCount}, Skipped: ${result.skippedTestCount}"
        }
    }

    // Enable JaCoCo test execution data collection
    finalizedBy jacocoTestReport
}

// JaCoCo configuration
jacoco {
    toolVersion = "0.8.11"
}

// Configure JaCoCo for test task - must be after jacoco block
tasks.withType(Test) {
    jacoco {
        enabled = true
    }
}

jacocoTestReport {
    // Don't fail if tests fail - generate report anyway
    mustRunAfter test
    reports {
        xml.required = true
        html.required = true
        csv.required = false
    }

    // Explicitly set execution data location
    executionData.setFrom(fileTree(layout.buildDirectory.dir("jacoco")).include("*.exec"))

}

// Task to generate coverage report
task coverageReport(type: JacocoReport) {
    group = 'verification'
    description = 'Generates a code coverage report'
    dependsOn test

    reports {
        xml.required = true
        html.required = true
        html.outputLocation = layout.buildDirectory.dir('reports/jacoco/html')
    }

    executionData test
    sourceSets sourceSets.main
}

// Spotless configuration for code formatting
spotless {
    java {
        // Remove unused imports first
        removeUnusedImports()

        // Use Google Java Format for code formatting
        // Note: googleJavaFormat will reorder imports, but we fix that below
        // Using 1.22.0 due to Guava dependency issue in 1.23.0 with Spotless
        googleJavaFormat('1.22.0')

        // Configure import order AFTER formatter to override Google Java Format's import ordering
        // Order matches Checkstyle exactly: /^java\./, javax, ch, org, com, net, app
        // Blank lines between groups (matches Checkstyle separated=true)
        // Static imports at top (matches Checkstyle option=top)
        // This MUST come after googleJavaFormat to fix import order
        importOrder('java', 'javax', '', 'ch', '', 'org', '', 'com', '', 'net', '', 'app')

        // Trim trailing whitespace
        trimTrailingWhitespace()

        // End files with a newline
        endWithNewline()

        // Exclude generated files
        targetExclude(
            'build/**',
            '**/build/**',
            '**/generated/**'
        )
    }

    // Format other file types
    format 'misc', {
        target '*.gradle', '*.md', '.gitignore'
        trimTrailingWhitespace()
        indentWithSpaces(4)
        endWithNewline()
    }
}

// Checkstyle configuration for code linting
checkstyle {
    toolVersion = '10.17.0'
    configFile = file("${project.rootDir}/config/checkstyle/checkstyle.xml")
    ignoreFailures = false
    maxWarnings = 0
}

tasks.named('checkstyleMain').configure {
    // Ensure code is formatted before checking style
    dependsOn 'spotlessApply'
    reports {
        xml.required = false
        html.required = true
    }
}

tasks.named('checkstyleTest').configure {
    // Ensure code is formatted before checking style
    dependsOn 'spotlessApply'
    reports {
        xml.required = false
        html.required = true
    }
}

// Error Prone configuration
dependencies {
    errorprone 'com.google.errorprone:error_prone_core:2.30.0'
    errorprone 'com.uber.nullaway:nullaway:0.11.3'
    errorproneJavac 'com.google.errorprone:javac:9+181-r4173-1'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'

    // Enable Error Prone
    options.errorprone.enabled = true

    options.errorprone {
        // Disable specific checks if needed
        // disable('CheckName')
        disable('DoNotCallSuggester')  // Suppress warnings about methods that always throw exceptions

        // Enable additional checks (uncomment as needed)
        enable('NullAway')  // Requires separate NullAway dependency

        // Treat NullAway violations as errors
        error('NullAway')

        // Configure NullAway to use jspecify annotations
        option('NullAway:AnnotatedPackages', 'app.cookyourbooks')
        option('NullAway:JSpecifyMode', 'true')

        // Exclude generated files and mutation testing files (intentional bugs)
        excludedPaths = '.*/build/generated/.*|.*_[A-Z][0-9]+\\.java'
    }

    // Show all Error Prone warnings
    options.compilerArgs += [
        '-Xmaxwarns', '1000'
    ]
}

// Ensure errorProne runs as part of the build
compileJava {
    // This task will now automatically use errorprone due to the configuration above
    dependsOn 'spotlessApply'
}

compileTestJava {
    // Also run errorprone on test code
    dependsOn 'spotlessApply'
}
